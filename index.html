<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      try {
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark')
        var isDark = (localStorage.getItem('theme') || 'dark') === 'dark'
        var palettes = {
          purple: { a:['#a855f7','#7c3aed','#1e0a3c','#c4b5fd'], rgb:'168,85,247',
            dd:['#2d1b4e','#7c5fa0','#1e1030','#110820','#5a4a70'], dl:['#ddd6fe','#7c3aed','#ede9fe','#f5f3ff','#a78bfa'] },
          cyan:   { a:['#06b6d4','#0891b2','#0c2a30','#a5f3fc'], rgb:'6,182,212',
            dd:['#0c2a34','#3a8090','#081820','#050f14','#2a5a66'], dl:['#cffafe','#0891b2','#e0f9ff','#f0fdff','#67e8f9'] },
          teal:   { a:['#14b8a6','#0d9488','#042420','#99f6e4'], rgb:'20,184,166',
            dd:['#0a2824','#3a8078','#061816','#040f0e','#2a5a56'], dl:['#ccfbf1','#0d9488','#e0fdf4','#f0fdf9','#5eead4'] },
          orange: { a:['#f97316','#ea580c','#2a0e02','#fdba74'], rgb:'249,115,22',
            dd:['#2a1a08','#906040','#1a1005','#100a03','#664030'], dl:['#ffedd5','#ea580c','#fff7ed','#fffbf5','#fb923c'] },
          pink:   { a:['#ec4899','#db2777','#2a0518','#f9a8d4'], rgb:'236,72,153',
            dd:['#2a0f1e','#904060','#1a0812','#10040a','#663050'], dl:['#fce7f3','#db2777','#fdf2f8','#fef9fc','#f472b6'] },
        }
        var p = palettes[localStorage.getItem('palette')] || palettes.purple
        var d = isDark ? p.dd : p.dl
        var s = document.documentElement.style
        s.setProperty('--accent', p.a[0]); s.setProperty('--accent2', p.a[1])
        s.setProperty('--accent3', p.a[2]); s.setProperty('--lavender', p.a[3])
        s.setProperty('--accent-rgb', p.rgb)
        s.setProperty('--pl-dim-u-bg', d[0]); s.setProperty('--pl-dim-u-fg', d[1])
        s.setProperty('--pl-dim-h-bg', d[2]); s.setProperty('--pl-dim-c-bg', d[3])
        s.setProperty('--pl-dim-c-fg', d[4])
      } catch(e) {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lau Wei Xiang</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
