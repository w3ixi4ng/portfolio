<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- 8×8 pixel grid, each cell 4×4 — mallard duck head facing right -->

  <!-- Green head -->
  <rect x="8"  y="0"  width="16" height="4" fill="#1a5c1a"/>
  <rect x="4"  y="4"  width="24" height="4" fill="#1a5c1a"/>
  <rect x="0"  y="8"  width="16" height="4" fill="#1a5c1a"/>
  <rect x="20" y="8"  width="12" height="4" fill="#1a5c1a"/>
  <rect x="0"  y="12" width="24" height="4" fill="#1a5c1a"/>

  <!-- Eye -->
  <rect x="16" y="8"  width="4"  height="4" fill="#080808"/>

  <!-- Yellow beak -->
  <rect x="24" y="12" width="8"  height="4" fill="#d4a000"/>

  <!-- White collar -->
  <rect x="0"  y="16" width="32" height="4" fill="#f0f0f0"/>

  <!-- Brown body -->
  <rect x="0"  y="20" width="32" height="4" fill="#7a4020"/>

  <!-- Dark wing shadow -->
  <rect x="0"  y="24" width="4"  height="8" fill="#3d1e0a"/>

  <!-- Brown mid-body -->
  <rect x="4"  y="24" width="12" height="8" fill="#7a4020"/>

  <!-- Cream chest -->
  <rect x="16" y="24" width="16" height="8" fill="#c0a882"/>
</svg>
